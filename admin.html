<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lowcountry Air — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0b1320; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0b1320; }
    ::-webkit-scrollbar-thumb { background: #2a3550; border-radius: 3px; }
    .status-new       { background:#1e3a5f;  color:#60a5fa; }
    .status-call_initiated { background:#1a3a2a; color:#4ade80; }
    .status-call_completed { background:#1a3a2a; color:#34d399; }
    .status-call_missed    { background:#3b1a1a; color:#f87171; }
    .status-booked         { background:#1a2f3a; color:#38bdf8; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    input::placeholder { color:#4b5563; }
  </style>
</head>
<body class="min-h-screen text-white">

<!-- ── Login screen ─────────────────────────────────────────── -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-3 mb-8 justify-center">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#a83900,#fe6a2a)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div class="font-black text-lg leading-none text-white">Lowcountry Air</div>
        <div class="text-xs" style="color:#79849b">Admin Dashboard</div>
      </div>
    </div>
    <div class="rounded-2xl p-6" style="background:#131f30;border:1px solid #1e2d42">
      <h1 class="text-xl font-bold mb-6 text-center">Sign In</h1>
      <input id="passwordInput" type="password" placeholder="Admin password"
        class="w-full px-4 py-3 rounded-xl text-sm mb-4 outline-none focus:ring-2 focus:ring-orange-500"
        style="background:#0b1320;border:1px solid #1e2d42;color:#fff;"
        onkeydown="if(event.key==='Enter')login()" />
      <div id="loginError" class="text-red-400 text-sm mb-3 hidden text-center">Incorrect password</div>
      <button onclick="login()"
        class="w-full py-3 rounded-xl font-bold text-white text-sm uppercase tracking-widest transition"
        style="background:linear-gradient(135deg,#a83900,#fe6a2a)">
        Enter Dashboard
      </button>
    </div>
  </div>
</div>

<!-- ── Dashboard ────────────────────────────────────────────── -->
<div id="dashboard" class="hidden">

  <!-- Header -->
  <header class="sticky top-0 z-50 px-4 sm:px-8 py-4 flex items-center justify-between" style="background:#0b1320;border-bottom:1px solid #1a2535">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#a83900,#fe6a2a)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <span class="font-black text-sm sm:text-base">Lowcountry Air <span class="font-normal opacity-50">/ Admin</span></span>
    </div>
    <div class="flex items-center gap-3">
      <span id="lastUpdated" class="text-xs hidden sm:block" style="color:#4b5563"></span>
      <button onclick="loadLeads()" class="text-xs px-3 py-1.5 rounded-lg font-semibold transition" style="background:#1a2535;color:#79849b">Refresh</button>
      <button onclick="logout()" class="text-xs px-3 py-1.5 rounded-lg font-semibold" style="background:#3b1a1a;color:#f87171">Sign Out</button>
    </div>
  </header>

  <!-- Stats row -->
  <div class="px-4 sm:px-8 pt-6 pb-2 grid grid-cols-2 sm:grid-cols-4 gap-3" id="statsRow"></div>

  <!-- Filter row -->
  <div class="px-4 sm:px-8 py-3 flex flex-wrap gap-2 items-center">
    <input id="searchInput" type="text" placeholder="Search name, phone, service..."
      class="flex-1 min-w-48 px-4 py-2 rounded-xl text-sm outline-none"
      style="background:#131f30;border:1px solid #1e2d42;color:#fff;"
      oninput="filterLeads()" />
    <select id="statusFilter" onchange="filterLeads()"
      class="px-4 py-2 rounded-xl text-sm outline-none"
      style="background:#131f30;border:1px solid #1e2d42;color:#79849b;">
      <option value="">All statuses</option>
      <option value="new">New</option>
      <option value="call_initiated">Call Initiated</option>
      <option value="call_completed">Call Completed</option>
      <option value="call_missed">Missed</option>
      <option value="booked">Booked</option>
    </select>
  </div>

  <!-- Lead cards -->
  <div class="px-4 sm:px-8 pb-12" id="leadsContainer">
    <div class="text-center py-20 opacity-40 text-sm">Loading leads…</div>
  </div>

</div>

<!-- ── Lead detail modal ─────────────────────────────────────── -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style="background:rgba(0,0,0,.7)">
  <div id="modalContent" class="w-full sm:max-w-lg max-h-screen sm:max-h-[90vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl p-6 sm:p-8 fade-in" style="background:#131f30;border:1px solid #1e2d42">
    <div id="modalBody"></div>
    <button onclick="closeModal()" class="mt-6 w-full py-3 rounded-xl font-bold text-sm" style="background:#1a2535;color:#79849b">Close</button>
  </div>
</div>

<script>
let allLeads = [];
let adminKey = '';

// ── Auth ────────────────────────────────────────────────────
function login() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (!pw) return;
  adminKey = pw;
  loadLeads();
}

function logout() {
  adminKey = '';
  allLeads = [];
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('passwordInput').value = '';
  document.getElementById('loginError').classList.add('hidden');
}

// ── Data ────────────────────────────────────────────────────
async function loadLeads() {
  try {
    const r = await fetch('/api/admin-leads', {
      headers: { 'x-admin-key': adminKey }
    });

    if (r.status === 401) {
      document.getElementById('loginError').classList.remove('hidden');
      return;
    }

    document.getElementById('loginError').classList.add('hidden');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');

    const { leads } = await r.json();
    allLeads = leads || [];

    renderStats();
    filterLeads();

    const el = document.getElementById('lastUpdated');
    el.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    el.classList.remove('hidden');
  } catch (err) {
    console.error(err);
  }
}

// ── Stats ───────────────────────────────────────────────────
function renderStats() {
  const total    = allLeads.length;
  const booked   = allLeads.filter(l => l.status === 'booked').length;
  const missed   = allLeads.filter(l => l.status === 'call_missed').length;
  const newLeads = allLeads.filter(l => l.status === 'new').length;

  document.getElementById('statsRow').innerHTML = `
    ${stat('Total Leads', total, '#60a5fa')}
    ${stat('Booked', booked, '#38bdf8')}
    ${stat('New', newLeads, '#4ade80')}
    ${stat('Missed', missed, '#f87171')}
  `;
}

function stat(label, value, color) {
  return `
    <div class="rounded-2xl p-4" style="background:#131f30;border:1px solid #1e2d42">
      <div class="text-2xl font-black" style="color:${color}">${value}</div>
      <div class="text-xs mt-1" style="color:#4b5563">${label}</div>
    </div>
  `;
}

// ── Filter + render ─────────────────────────────────────────
function filterLeads() {
  const q  = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('statusFilter').value;

  const filtered = allLeads.filter(l => {
    const matchQ  = !q || [l.name, l.phone, l.email, l.service, l.address, l.message]
      .some(f => (f || '').toLowerCase().includes(q));
    const matchSt = !st || l.status === st;
    return matchQ && matchSt;
  });

  renderLeads(filtered);
}

function renderLeads(leads) {
  const container = document.getElementById('leadsContainer');
  if (!leads.length) {
    container.innerHTML = '<div class="text-center py-20 opacity-30 text-sm">No leads found</div>';
    return;
  }

  container.innerHTML = leads.map(lead => leadCard(lead)).join('');
}

function leadCard(l) {
  const date    = new Date(l.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const time    = new Date(l.created_at).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  const badge   = statusBadge(l.status);
  const initial = (l.name || '?')[0].toUpperCase();

  return `
    <div class="rounded-2xl p-4 sm:p-5 mb-3 cursor-pointer transition hover:brightness-110 fade-in"
      style="background:#131f30;border:1px solid #1e2d42"
      onclick='openModal(${JSON.stringify(l).replace(/'/g, "&#39;")})'>
      <div class="flex items-start gap-3">
        <div class="w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-sm"
          style="background:linear-gradient(135deg,#a83900,#fe6a2a)">${initial}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2 flex-wrap">
            <span class="font-bold text-sm">${l.name || '—'}</span>
            <span class="text-xs px-2.5 py-1 rounded-full font-semibold ${badge.cls}">${badge.label}</span>
          </div>
          <div class="flex flex-wrap gap-x-4 gap-y-1 mt-1.5 text-xs" style="color:#79849b">
            <a href="tel:${l.phone}" onclick="event.stopPropagation()" class="hover:text-orange-400 font-medium">${l.phone}</a>
            <span>${l.service || 'General inquiry'}</span>
            ${l.address ? `<span class="hidden sm:inline">${l.address}</span>` : ''}
          </div>
          ${l.booking_time ? `<div class="mt-2 text-xs px-2.5 py-1 rounded-lg inline-block" style="background:#0d2535;color:#38bdf8">📅 ${l.booking_time}</div>` : ''}
          ${l.ai_response && !l.booking_time ? `<p class="mt-2 text-xs leading-relaxed line-clamp-2" style="color:#4b5563">${l.ai_response}</p>` : ''}
        </div>
      </div>
      <div class="flex items-center justify-between mt-3 pt-3" style="border-top:1px solid #1a2535">
        <span class="text-xs" style="color:#2a3550">${date} · ${time}</span>
        <div class="flex gap-2">
          <a href="tel:${l.phone}" onclick="event.stopPropagation()"
            class="text-xs px-3 py-1.5 rounded-lg font-bold transition hover:brightness-110"
            style="background:linear-gradient(135deg,#a83900,#fe6a2a);color:#fff">
            Call Now
          </a>
          ${l.email ? `<a href="mailto:${l.email}" onclick="event.stopPropagation()"
            class="text-xs px-3 py-1.5 rounded-lg font-bold transition"
            style="background:#1a2535;color:#79849b">
            Email
          </a>` : ''}
        </div>
      </div>
    </div>
  `;
}

// ── Modal ───────────────────────────────────────────────────
function openModal(l) {
  const badge = statusBadge(l.status);
  const date  = new Date(l.created_at).toLocaleString('en-US', { timeZone:'America/New_York', month:'long', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });

  document.getElementById('modalBody').innerHTML = `
    <div class="flex items-start justify-between mb-6">
      <div>
        <h2 class="text-xl font-black">${l.name || '—'}</h2>
        <div class="text-xs mt-1" style="color:#4b5563">${date}</div>
      </div>
      <span class="text-xs px-2.5 py-1 rounded-full font-semibold ${badge.cls}">${badge.label}</span>
    </div>

    <div class="space-y-2 mb-6 text-sm">
      ${row('Phone',   `<a href="tel:${l.phone}" class="font-bold hover:text-orange-400" style="color:#fe6a2a">${l.phone}</a>`)}
      ${l.email   ? row('Email',   `<a href="mailto:${l.email}" class="hover:underline" style="color:#60a5fa">${l.email}</a>`) : ''}
      ${l.service ? row('Service', l.service) : ''}
      ${l.address ? row('Address', l.address) : ''}
      ${l.system_type ? row('System', l.system_type) : ''}
      ${l.message ? row('Message', `<em>${l.message}</em>`) : ''}
      ${l.booking_time ? row('Booking', `<span style="color:#38bdf8">📅 ${l.booking_time}</span>`) : ''}
    </div>

    ${l.ai_response ? `
      <div class="rounded-xl p-4 mb-6 text-sm leading-relaxed" style="background:#0b1320;border:1px solid #1a2535;color:#c0cce0">
        <div class="text-xs font-bold uppercase tracking-widest mb-2" style="color:#2a3550">AI Summary / Response</div>
        ${l.ai_response}
      </div>
    ` : ''}

    <div class="flex gap-3">
      <a href="tel:${l.phone}"
        class="flex-1 py-3 rounded-xl font-black text-sm text-center text-white uppercase tracking-widest transition hover:brightness-110"
        style="background:linear-gradient(135deg,#a83900,#fe6a2a)">
        Call ${(l.name || '').split(' ')[0] || 'Customer'}
      </a>
      ${l.email ? `<a href="mailto:${l.email}"
        class="flex-1 py-3 rounded-xl font-bold text-sm text-center uppercase tracking-widest transition"
        style="background:#1a2535;color:#79849b">
        Email
      </a>` : ''}
    </div>
  `;

  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Helpers ─────────────────────────────────────────────────
function row(label, value) {
  return `<div class="flex gap-3">
    <span class="w-20 flex-shrink-0 text-xs pt-0.5" style="color:#4b5563">${label}</span>
    <span class="font-medium leading-snug">${value}</span>
  </div>`;
}

function statusBadge(status) {
  const map = {
    new:            { label: 'New',          cls: 'status-new' },
    call_initiated: { label: 'Calling…',     cls: 'status-call_initiated' },
    call_completed: { label: 'Called',       cls: 'status-call_completed' },
    call_missed:    { label: 'Missed',       cls: 'status-call_missed' },
    booked:         { label: 'Booked',       cls: 'status-booked' },
  };
  return map[status] || { label: status || 'Unknown', cls: 'status-new' };
}

// ── Auto-refresh every 60 s while on dashboard ──────────────
setInterval(() => {
  if (adminKey && !document.getElementById('dashboard').classList.contains('hidden')) {
    loadLeads();
  }
}, 60000);

// Focus password field on load
document.getElementById('passwordInput').focus();
</script>
</body>
</html>
